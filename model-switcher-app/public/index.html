<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦐 OpenClaw 小龙虾</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        .title-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo {
            font-size: 48px;
        }
        .title-text h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .title-text p {
            color: #666;
            font-size: 14px;
        }
        
        /* 状态栏 */
        .status-bar {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dc3545;
        }
        .status-dot.running {
            background: #28a745;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .status-text {
            font-weight: 600;
            color: #333;
        }
        .current-model {
            color: #667eea;
            font-weight: 600;
        }
        
        /* 启动界面 */
        .launch-screen {
            text-align: center;
            padding: 80px 20px;
        }
        .launch-icon {
            font-size: 120px;
            margin-bottom: 30px;
        }
        .launch-title {
            font-size: 32px;
            color: #333;
            margin-bottom: 15px;
        }
        .launch-desc {
            color: #666;
            font-size: 16px;
            margin-bottom: 40px;
        }
        .btn-large {
            padding: 20px 60px;
            font-size: 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-large:hover {
            background: #218838;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(40, 167, 69, 0.3);
        }
        .btn-large:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 主内容区 - 横版布局 */
        .main-content {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        
        /* API 提供商列表 */
        .providers-panel {
            width: 250px;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
        }
        .panel-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .provider-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .provider-item:hover {
            border-color: #667eea;
            transform: translateX(5px);
        }
        .provider-item.active {
            background: #667eea;
            color: white;
            border-color: #5568d3;
        }
        .provider-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .provider-url {
            font-size: 11px;
            opacity: 0.7;
            word-break: break-all;
        }
        .provider-count {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.8;
        }
        
        /* 模型列表 */
        .models-panel {
            flex: 1;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
        }
        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }
        .model-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
        }
        .model-card:hover {
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .model-card.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #5568d3;
        }
        .model-card.current {
            border-color: #28a745;
            border-width: 3px;
        }
        .model-card.current::after {
            content: '✓ 当前使用';
            position: absolute;
            top: 10px;
            right: 10px;
            background: #28a745;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .model-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }
        .model-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 5px;
        }
        .model-type {
            font-size: 11px;
            padding: 3px 8px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
            display: inline-block;
        }
        .model-card.active .model-type {
            background: rgba(255,255,255,0.2);
        }
        .model-description {
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .model-features {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }
        .feature-tag {
            font-size: 11px;
            padding: 3px 8px;
            background: #e9ecef;
            border-radius: 10px;
        }
        .model-card.active .feature-tag {
            background: rgba(255,255,255,0.2);
        }
        .model-meta {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }
        .model-card.active .model-meta {
            border-top-color: rgba(255,255,255,0.2);
        }
        .best-for {
            font-size: 12px;
            margin-top: 8px;
            padding: 8px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 5px;
            border-left: 3px solid #667eea;
        }
        .model-card.active .best-for {
            background: rgba(255,255,255,0.15);
            border-left-color: white;
        }
        
        /* 操作按钮 */
        .actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-success:hover:not(:disabled) {
            background: #218838;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-danger:hover:not(:disabled) {
            background: #c82333;
        }
        
        /* 提示信息 */
        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s;
        }
        .alert.show {
            display: block;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }
        
        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none;
        }
        
        /* 滚动条样式 */
        .models-grid::-webkit-scrollbar {
            width: 8px;
        }
        .models-grid::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .models-grid::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }
        .models-grid::-webkit-scrollbar-thumb:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="title-section">
                <div class="logo">🦐</div>
                <div class="title-text">
                    <h1>OpenClaw 小龙虾</h1>
                    <p>AI 编码助手控制面板 - Coding Plan</p>
                </div>
            </div>
            <div class="status-bar">
                <div class="status-indicator">
                    <div class="status-dot" id="statusDot"></div>
                    <span class="status-text" id="statusText">检查中...</span>
                </div>
            </div>
        </div>
        
        <div id="alert" class="alert"></div>
        
        <!-- 启动界面 -->
        <div id="launchScreen" class="launch-screen hidden">
            <div class="launch-icon">🦐</div>
            <div class="launch-title">OpenClaw 未运行</div>
            <div class="launch-desc">点击下方按钮启动 AI 编码助手服务</div>
            <button class="btn-large" onclick="startOpenClaw()">
                🚀 启动 OpenClaw 服务
            </button>
        </div>
        
        <!-- 运行界面 -->
        <div id="runningScreen" class="hidden">
            <div class="main-content">
                <!-- API 提供商列表 -->
                <div class="providers-panel">
                    <div class="panel-title">
                        🔌 API 提供商
                    </div>
                    <div id="providersList">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>加载中...</p>
                        </div>
                    </div>
                </div>
                
                <!-- 模型列表 -->
                <div class="models-panel">
                    <div class="panel-title">
                        🤖 可用模型 <span id="modelCount" style="color: #667eea;"></span>
                    </div>
                    <div class="models-grid" id="modelsList">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>加载模型列表...</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 操作按钮 -->
            <div class="actions">
                <button class="btn btn-primary" id="applyBtn" onclick="applyChanges()" disabled>
                    ✓ 应用更改并重启服务
                </button>
                <button class="btn btn-success" onclick="openDashboard()">
                    📊 打开 Web 控制台
                </button>
                <button class="btn btn-danger" onclick="stopOpenClaw()">
                    ⏹ 停止服务
                </button>
            </div>
        </div>
    </div>
    
    <script>
        let currentModel = '';
        let selectedModel = '';
        let providers = {};
        let selectedProvider = '';
        let isRunning = false;
        
        async function checkStatus() {
            try {
                const response = await fetch('http://localhost:18792/api/status');
                const data = await response.json();
                isRunning = data.running;
                
                if (isRunning) {
                    showRunningScreen();
                    updateStatus(data);
                    await loadConfig();
                } else {
                    showLaunchScreen();
                }
            } catch (error) {
                showLaunchScreen();
            }
        }
        
        function showLaunchScreen() {
            document.getElementById('launchScreen').classList.remove('hidden');
            document.getElementById('runningScreen').classList.add('hidden');
            document.getElementById('statusText').textContent = '服务未运行';
            document.getElementById('statusDot').classList.remove('running');
        }
        
        function showRunningScreen() {
            document.getElementById('launchScreen').classList.add('hidden');
            document.getElementById('runningScreen').classList.remove('hidden');
        }
        
        async function startOpenClaw() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '🚀 正在启动...';
            
            try {
                showAlert('正在启动 OpenClaw 服务，请稍候...', 'warning');
                
                const response = await fetch('http://localhost:18792/api/start-service', {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('✓ OpenClaw 启动成功！', 'success');
                    setTimeout(() => {
                        checkStatus();
                    }, 2000);
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                showAlert('启动失败: ' + error.message, 'error');
                btn.disabled = false;
                btn.textContent = '🚀 启动 OpenClaw 服务';
            }
        }
        
        async function stopOpenClaw() {
            if (!confirm('确定要停止 OpenClaw 服务吗？')) {
                return;
            }
            
            try {
                showAlert('正在停止服务...', 'warning');
                
                const response = await fetch('http://localhost:18792/api/stop-service', {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('✓ 服务已停止', 'success');
                    setTimeout(() => {
                        checkStatus();
                    }, 1000);
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                showAlert('停止失败: ' + error.message, 'error');
            }
        }
        
        function openDashboard() {
            window.open('http://localhost:18789', '_blank');
        }
        
        async function loadConfig() {
            try {
                const response = await fetch('http://localhost:18792/api/config');
                const data = await response.json();
                
                if (data.success) {
                    currentModel = data.currentModel;
                    selectedModel = currentModel;
                    providers = data.providers;
                    
                    // 默认选择第一个 provider
                    if (!selectedProvider && Object.keys(providers).length > 0) {
                        selectedProvider = Object.keys(providers)[0];
                    }
                    
                    renderProviders();
                    renderModels();
                }
            } catch (error) {
                showAlert('加载配置失败: ' + error.message, 'error');
            }
        }
        
        function updateStatus(data) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            if (data.running) {
                statusDot.classList.add('running');
                const modelName = data.currentModel.split('/').pop();
                statusText.innerHTML = `服务运行中 - 当前模型: <span class="current-model">${modelName}</span>`;
                currentModel = data.currentModel;
            } else {
                statusDot.classList.remove('running');
                statusText.textContent = '服务未运行';
            }
        }
        
        function renderProviders() {
            const container = document.getElementById('providersList');
            container.innerHTML = '';
            
            Object.keys(providers).forEach(providerName => {
                const provider = providers[providerName];
                const item = document.createElement('div');
                item.className = 'provider-item';
                if (providerName === selectedProvider) {
                    item.classList.add('active');
                }
                
                item.innerHTML = `
                    <div class="provider-name">${providerName}</div>
                    <div class="provider-url">${provider.baseUrl}</div>
                    <div class="provider-count">${provider.models.length} 个模型</div>
                `;
                
                item.onclick = () => selectProvider(providerName);
                container.appendChild(item);
            });
        }
        
        function selectProvider(providerName) {
            selectedProvider = providerName;
            renderProviders();
            renderModels();
        }
        
        function renderModels() {
            const container = document.getElementById('modelsList');
            const provider = providers[selectedProvider];
            
            if (!provider) {
                container.innerHTML = '<div class="loading"><p>请选择 API 提供商</p></div>';
                return;
            }
            
            document.getElementById('modelCount').textContent = `(${provider.models.length})`;
            container.innerHTML = '';
            
            provider.models.forEach(model => {
                const card = document.createElement('div');
                card.className = 'model-card';
                
                if (model.fullId === selectedModel) {
                    card.classList.add('active');
                }
                if (model.fullId === currentModel) {
                    card.classList.add('current');
                }
                
                const info = model.info;
                card.innerHTML = `
                    <div class="model-header">
                        <div>
                            <div class="model-name">${info.name}</div>
                            <span class="model-type">${info.type}</span>
                        </div>
                    </div>
                    <div class="model-description">${info.description}</div>
                    <div class="model-features">
                        ${info.features.map(f => `<span class="feature-tag">${f}</span>`).join('')}
                    </div>
                    <div class="best-for">
                        <strong>适用场景:</strong> ${info.bestFor}
                    </div>
                    <div class="model-meta">
                        📊 上下文: ${info.contextWindow}
                    </div>
                `;
                
                card.onclick = () => selectModel(model.fullId);
                container.appendChild(card);
            });
        }
        
        function selectModel(modelId) {
            selectedModel = modelId;
            renderModels();
            
            const applyBtn = document.getElementById('applyBtn');
            applyBtn.disabled = (selectedModel === currentModel);
        }
        
        async function applyChanges() {
            const applyBtn = document.getElementById('applyBtn');
            applyBtn.disabled = true;
            applyBtn.textContent = '⏳ 正在应用更改...';
            
            try {
                const switchResponse = await fetch('http://localhost:18792/api/switch-model', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: selectedModel })
                });
                
                const switchData = await switchResponse.json();
                
                if (!switchData.success) {
                    throw new Error(switchData.error);
                }
                
                showAlert('配置已更新，正在重启服务...', 'warning');
                applyBtn.textContent = '⏳ 正在重启服务...';
                
                const restartResponse = await fetch('http://localhost:18792/api/restart-service', {
                    method: 'POST'
                });
                
                const restartData = await restartResponse.json();
                
                if (restartData.success) {
                    showAlert('✓ 模型切换成功！新模型已生效', 'success');
                    currentModel = selectedModel;
                    applyBtn.textContent = '✓ 应用更改并重启服务';
                    setTimeout(() => {
                        checkStatus();
                    }, 2000);
                } else {
                    throw new Error(restartData.error);
                }
            } catch (error) {
                showAlert('操作失败: ' + error.message, 'error');
                applyBtn.textContent = '✓ 应用更改并重启服务';
                applyBtn.disabled = false;
            }
        }
        
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type} show`;
            alert.textContent = message;
            
            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }
        
        // 初始化
        checkStatus();
        setInterval(checkStatus, 10000);
    </script>
</body>
</html>
