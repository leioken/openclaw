<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>🦐 OpenClaw 小龙虾</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        .title-section { display: flex; align-items: center; gap: 15px; }
        .logo { font-size: 48px; }
        .title-text h1 { color: #667eea; font-size: 28px; }
        .title-text p { color: #666; font-size: 14px; }
        .status-bar {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 10px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #28a745;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .main-content { display: flex; gap: 20px; margin-top: 20px; }
        .providers-panel {
            width: 250px;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
        }
        .panel-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; }
        .provider-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .provider-item:hover { border-color: #667eea; }
        .provider-item.active { background: #667eea; color: white; }
        .provider-name { font-weight: 600; font-size: 14px; }
        .provider-url { font-size: 11px; opacity: 0.7; }
        .models-panel { flex: 1; background: #f8f9fa; border-radius: 10px; padding: 20px; }
        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
        }
        .model-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            position: relative;
        }
        .model-card:hover { border-color: #667eea; }
        .model-card.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .model-card.current { border-color: #28a745; border-width: 3px; }
        .model-card.current::after {
            content: '✓ 当前';
            position: absolute;
            top: 10px;
            right: 10px;
            background: #28a745;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
        }
        .model-name { font-weight: 600; font-size: 16px; margin-bottom: 5px; }
        .model-type {
            font-size: 11px;
            padding: 3px 8px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        .model-card.active .model-type { background: rgba(255,255,255,0.2); }
        .model-description { font-size: 13px; opacity: 0.8; margin: 10px 0; }
        .model-features { display: flex; flex-wrap: wrap; gap: 5px; margin: 10px 0; }
        .feature-tag {
            font-size: 11px;
            padding: 3px 8px;
            background: #e9ecef;
            border-radius: 10px;
        }
        .model-card.active .feature-tag { background: rgba(255,255,255,0.2); }
        .best-for {
            font-size: 12px;
            padding: 8px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 5px;
        }
        .model-card.active .best-for { background: rgba(255,255,255,0.15); }
        .actions { display: flex; gap: 15px; margin-top: 20px; }
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: #667eea; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .alert.show { display: block; }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-section">
                <div class="logo">🦐</div>
                <div class="title-text">
                    <h1>OpenClaw 小龙虾</h1>
                    <p>AI 编码助手控制面板</p>
                </div>
            </div>
            <div class="status-bar">
                <span class="status-dot"></span>
                <span id="statusText">服务运行中</span>
            </div>
        </div>
        
        <div id="alert" class="alert"></div>
        
        <div class="main-content">
            <div class="providers-panel">
                <div class="panel-title">🔌 API 提供商</div>
                <div id="providersList"></div>
            </div>
            
            <div class="models-panel">
                <div class="panel-title">🤖 可用模型 <span id="modelCount"></span></div>
                <div class="models-grid" id="modelsList"></div>
            </div>
        </div>
        
        <div class="actions">
            <button class="btn btn-primary" id="applyBtn" disabled>✓ 应用更改并重启服务</button>
            <button class="btn btn-success" onclick="window.open('http://localhost:18789')">📊 打开 Web 控制台</button>
        </div>
    </div>
    
    <script>
    console.log('=== 小龙虾启动 ===');
    
    let currentModel = '';
    let selectedModel = '';
    let providers = {};
    let selectedProvider = '';
    
    async function loadConfig() {
        console.log('[loadConfig] 开始...');
        try {
            const res = await fetch('/api/config');
            const data = await res.json();
            console.log('[loadConfig] 数据:', data);
            
            if (data.success) {
                currentModel = data.currentModel;
                selectedModel = currentModel;
                providers = data.providers;
                
                if (!selectedProvider && Object.keys(providers).length > 0) {
                    selectedProvider = Object.keys(providers)[0];
                }
                
                document.getElementById('statusText').innerHTML = 
                    '服务运行中 - 当前: <span style="color:#667eea;font-weight:600">' + 
                    currentModel.split('/').pop() + '</span>';
                
                renderProviders();
                renderModels();
            }
        } catch (error) {
            console.error('[loadConfig] 错误:', error);
        }
    }
    
    function renderProviders() {
        const container = document.getElementById('providersList');
        container.innerHTML = '';
        
        Object.keys(providers).forEach(name => {
            const p = providers[name];
            const div = document.createElement('div');
            div.className = 'provider-item' + (name === selectedProvider ? ' active' : '');
            div.innerHTML = `
                <div class="provider-name">${name}</div>
                <div class="provider-url">${p.baseUrl}</div>
                <div class="provider-count">${p.models.length} 个模型</div>
            `;
            div.onclick = () => {
                selectedProvider = name;
                renderProviders();
                renderModels();
            };
            container.appendChild(div);
        });
    }
    
    function renderModels() {
        const container = document.getElementById('modelsList');
        const p = providers[selectedProvider];
        if (!p) return;
        
        document.getElementById('modelCount').textContent = `(${p.models.length})`;
        container.innerHTML = '';
        
        p.models.forEach(m => {
            const div = document.createElement('div');
            div.className = 'model-card';
            if (m.fullId === selectedModel) div.classList.add('active');
            if (m.fullId === currentModel) div.classList.add('current');
            
            const info = m.info;
            div.innerHTML = `
                <div class="model-name">${info.name}</div>
                <span class="model-type">${info.type}</span>
                <div class="model-description">${info.description}</div>
                <div class="model-features">
                    ${info.features.map(f => `<span class="feature-tag">${f}</span>`).join('')}
                </div>
                <div class="best-for"><strong>适用:</strong> ${info.bestFor}</div>
            `;
            div.onclick = () => {
                selectedModel = m.fullId;
                renderModels();
                document.getElementById('applyBtn').disabled = (selectedModel === currentModel);
            };
            container.appendChild(div);
        });
    }
    
    document.getElementById('applyBtn').onclick = async function() {
        console.log('[apply] 切换到:', selectedModel);
        this.disabled = true;
        this.textContent = '⏳ 处理中...';
        
        try {
            const res1 = await fetch('/api/switch-model', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: selectedModel })
            });
            const data1 = await res1.json();
            if (!data1.success) throw new Error(data1.error);
            
            const res2 = await fetch('/api/restart-service', { method: 'POST' });
            const data2 = await res2.json();
            if (!data2.success) throw new Error(data2.error);
            
            alert('✓ 模型切换成功！');
            currentModel = selectedModel;
            this.textContent = '✓ 应用更改并重启服务';
            setTimeout(loadConfig, 2000);
        } catch (error) {
            alert('失败: ' + error.message);
            this.textContent = '✓ 应用更改并重启服务';
            this.disabled = false;
        }
    };
    
    function showAlert(msg, type) {
        const alert = document.getElementById('alert');
        alert.className = 'alert alert-' + type + ' show';
        alert.textContent = msg;
        setTimeout(() => alert.classList.remove('show'), 5000);
    }
    
    // 初始化
    loadConfig();
    </script>
</body>
</html>
